<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' }
                    }
                }
            }
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }
        .dark .glass-panel {
            background: rgba(17, 24, 39, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .bg-gradient-animate {
            background: linear-gradient(-45deg, #f3e8ff, #e0e7ff, #fce7f3, #fae8ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        .dark .bg-gradient-animate {
            background: linear-gradient(-45deg, #1e1b4b, #0f172a, #2e1065, #171717);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
    </style>
</head>
<body class="bg-gradient-animate text-gray-900 dark:text-gray-100 transition-colors duration-500 min-h-screen flex flex-col">

    <header class="glass-panel sticky top-0 z-40 border-b-0 border-t-0 border-l-0 border-r-0 border-b-white/20 dark:border-b-white/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-600 to-indigo-500 tracking-tight">
                Vision AI
            </h1>

            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2.5 rounded-full bg-white/50 dark:bg-black/30 text-gray-600 dark:text-gray-300 hover:scale-105 backdrop-blur-md transition-all">
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607l.707.707a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 011.414-1.414zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm4.95-4.646l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zm-5.9 9.9l.707.707a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 011.414-1.414zM10 15a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1z" clip-rule="evenodd"></path></svg>
                </button>
                <a href="/generator" class="flex items-center justify-center px-6 py-2.5 rounded-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-semibold transition-all shadow-lg hover:shadow-purple-500/40 hover:-translate-y-0.5 gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Новый Арт
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-10 w-full">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            {% for img in images %}
            <div 
                class="group relative aspect-[3/4] glass-panel rounded-3xl overflow-hidden cursor-zoom-in hover:shadow-2xl hover:shadow-purple-500/20 transition-all duration-500 transform hover:-translate-y-1"
                onclick="openModal({{ loop.index0 }})"
            >
                <img src="{{ url_for('static', filename=img.url) }}" alt="{{ img.name }}" loading="lazy" class="w-full h-full object-cover transform transition duration-700 group-hover:scale-105">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                    <p class="text-white text-xs font-semibold line-clamp-3 mb-1">{{ img.prompt }}</p>
                    <div class="flex justify-between items-center w-full">
                        <p class="text-white/70 text-[10px]">{{ img.date }}</p>
                        <p class="text-white/70 text-[10px] bg-white/20 px-1.5 py-0.5 rounded">{{ img.style }}</p>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-span-full flex flex-col items-center justify-center py-32 text-gray-500 dark:text-gray-400">
                <div class="w-24 h-24 bg-white/40 dark:bg-black/20 backdrop-blur-md rounded-full flex items-center justify-center mb-6 shadow-inner">
                    <svg class="w-10 h-10 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <p class="text-xl font-medium">Галерея пуста</p>
                <p class="text-sm mt-2">Время создать первый шедевр!</p>
            </div>
            {% endfor %}
        </div>
    </main>

    <div id="imageModal" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-xl transition-opacity opacity-0" id="modalBackdrop"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 sm:p-8" id="modalWrapper">
            <div id="modalContent" class="relative glass-panel w-full max-w-6xl h-[85vh] rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row transform scale-95 opacity-0 transition-all duration-500 border border-white/20">
                
                <button onclick="closeModal()" class="absolute top-6 right-6 z-30 text-white hover:text-white bg-black/30 hover:bg-black/60 rounded-full p-2.5 backdrop-blur-md transition-all hover:rotate-90">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>

                <div class="flex-1 bg-black/20 flex items-center justify-center p-6 overflow-hidden relative group">
                    <button onclick="prevImage(event)" class="absolute left-6 p-4 rounded-full bg-white/10 hover:bg-white/20 text-white backdrop-blur-md transition-all opacity-0 group-hover:opacity-100 -translate-x-4 group-hover:translate-x-0 z-20">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <img id="modalImage" src="" alt="" class="max-w-full max-h-full object-contain drop-shadow-2xl transition-opacity duration-300 rounded-lg">
                    <button onclick="nextImage(event)" class="absolute right-6 p-4 rounded-full bg-white/10 hover:bg-white/20 text-white backdrop-blur-md transition-all opacity-0 group-hover:opacity-100 translate-x-4 group-hover:translate-x-0 z-20">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>

                <div class="w-full md:w-80 lg:w-[400px] bg-white/50 dark:bg-black/50 backdrop-blur-3xl border-l border-white/20 dark:border-white/5 flex flex-col z-10">
                    <div class="p-6 border-b border-white/20 dark:border-white/5 flex justify-between items-center">
                        <div>
                            <h2 class="text-xl font-bold mb-1">Детали</h2>
                            <p class="text-xs text-gray-500 dark:text-gray-400">Настройки генерации</p>
                        </div>
                    </div>
                    
                    <div class="p-6 flex-1 overflow-y-auto space-y-5">
                        
                        <!-- Промпт -->
                        <div>
                            <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-2">Промпт</p>
                            <div class="bg-white/40 dark:bg-black/30 p-3 rounded-xl border border-white/40 dark:border-gray-700/50 max-h-32 overflow-y-auto shadow-inner">
                                <p id="modalPrompt" class="text-sm font-medium text-gray-800 dark:text-gray-200 break-words"></p>
                            </div>
                        </div>

                        <!-- Негативный Промпт -->
                        <div id="modalNegativeBlock">
                            <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-2">Негативный промпт</p>
                            <div class="bg-white/40 dark:bg-black/30 p-3 rounded-xl border border-white/40 dark:border-gray-700/50 max-h-24 overflow-y-auto shadow-inner">
                                <p id="modalNegative" class="text-xs font-medium text-gray-600 dark:text-gray-400 break-words"></p>
                            </div>
                        </div>
                        
                        <hr class="border-gray-300 dark:border-gray-700">

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-1">Стиль</p>
                                <p id="modalStyle" class="text-sm font-bold text-purple-600 dark:text-purple-400"></p>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-1">Создано</p>
                                <p id="modalDate" class="text-sm font-medium"></p>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-1">Шаги (Steps)</p>
                                <p id="modalSteps" class="text-sm font-medium"></p>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-1">CFG Scale</p>
                                <p id="modalGuidance" class="text-sm font-medium"></p>
                            </div>
                        </div>

                        <div class="pt-6 mt-auto">
                            <div class="flex gap-2">
                                <a id="downloadLink" href="#" download class="flex-1 flex items-center justify-center py-3 px-4 rounded-2xl shadow-lg text-sm font-bold text-white bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 transition-all gap-2 transform hover:-translate-y-0.5">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                    Оригинал
                                </a>
                                
                                <button onclick="deleteCurrentImage()" title="Удалить навсегда" class="flex-none flex items-center justify-center py-3 px-4 rounded-2xl shadow-lg text-white bg-red-600 hover:bg-red-500 transition-all transform hover:-translate-y-0.5">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const images = {{ images | tojson }};
        let currentIndex = 0;

        const modal = document.getElementById('imageModal');
        const modalContent = document.getElementById('modalContent');
        const backdrop = document.getElementById('modalBackdrop');
        const modalImg = document.getElementById('modalImage');
        
        const modalPrompt = document.getElementById('modalPrompt');
        const modalNegative = document.getElementById('modalNegative');
        const modalNegativeBlock = document.getElementById('modalNegativeBlock');
        const modalStyle = document.getElementById('modalStyle');
        const modalSteps = document.getElementById('modalSteps');
        const modalGuidance = document.getElementById('modalGuidance');
        const modalDate = document.getElementById('modalDate');
        
        const downloadLink = document.getElementById('downloadLink');

        function openModal(index) {
            currentIndex = index;
            updateModalContent();
            modal.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            backdrop.classList.add('opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modalImg.src = '';
                document.body.style.overflow = 'auto';
            }, 500);
        }

        function updateModalContent() {
            if(images.length === 0) return;
            const imgData = images[currentIndex];
            modalImg.style.opacity = '0';
            setTimeout(() => modalImg.style.opacity = '1', 50);
            
            modalImg.src = "/static/" + imgData.url;
            
            modalPrompt.textContent = imgData.prompt;
            
            if(imgData.negative_prompt) {
                modalNegative.textContent = imgData.negative_prompt;
                modalNegativeBlock.classList.remove('hidden');
            } else {
                modalNegativeBlock.classList.add('hidden');
            }
            
            modalStyle.textContent = imgData.style;
            modalSteps.textContent = imgData.steps;
            modalGuidance.textContent = imgData.guidance_scale;
            modalDate.textContent = imgData.date;
            
            downloadLink.href = "/static/" + imgData.url;
        }

        async function deleteCurrentImage() {
            if(!confirm('Вы уверены, что хотите навсегда удалить это изображение?')) return;
            
            const imgData = images[currentIndex];
            try {
                const response = await fetch('/delete_image/' + encodeURIComponent(imgData.name), {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    window.location.reload();
                } else {
                    alert('Ошибка при удалении: ' + data.error);
                }
            } catch (err) {
                alert('Сетевая ошибка при попытке удаления.');
            }
        }

        function nextImage(e) { if(e) e.stopPropagation(); currentIndex = (currentIndex + 1) % images.length; updateModalContent(); }
        function prevImage(e) { if(e) e.stopPropagation(); currentIndex = (currentIndex - 1 + images.length) % images.length; updateModalContent(); }

        document.getElementById('modalWrapper').addEventListener('click', (e) => { if(e.target === document.getElementById('modalWrapper')) closeModal(); });
        document.addEventListener('keydown', (e) => { if (modal.classList.contains('hidden')) return; if (e.key === 'Escape') closeModal(); if (e.key === 'ArrowRight') nextImage(); if (e.key === 'ArrowLeft') prevImage(); });

        const themeBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        function updateIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            darkIcon.classList.toggle('hidden', isDark);
            lightIcon.classList.toggle('hidden', !isDark);
        }
        updateIcons();
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateIcons();
        });
    </script>
</body>
</html>
