<main class="flex-grow flex flex-col lg:flex-row max-w-7xl mx-auto w-full p-4 gap-6"></main>
    <div class="w-full lg:w-1/3 space-y-6">
        <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800 h-full">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Промпт (на английском)</label>
                <textarea id="promptInput" class="w-full h-32 p-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none resize-none transition-all" placeholder="Например: futuristic city in neon lights, cyberpunk..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Соотношение</label>
                    <select id="ratioSelect" class="w-full p-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-sm">
                        <option value="1:1">1:1 (Квадрат)</option>
                        <option value="16:9">16:9 (Альбом)</option>
                        <option value="9:16">9:16 (Портрет)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Стиль</label>
                    <select id="styleSelect" class="w-full p-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-sm">
                        <option>Реализм</option>
                        <option>Аниме</option>
                        <option>3D Рендер</option>
                        <option>Масло</option>
                    </select>
                </div>
            </div>

            <button id="generateBtn" class="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 group">
                <span id="btnText">Генерировать</span>
                <div id="loader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
        </div>
    </div>

    <div class="w-full lg:w-2/3">
        <div id="resultContainer" class="bg-gray-100 dark:bg-gray-900 border-2 border-dashed border-gray-300 dark:border-gray-800 rounded-2xl h-[600px] flex items-center justify-center relative overflow-hidden">
            <div id="placeholder" class="text-center opacity-40">
                <svg class="w-24 h-24 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <p class="text-lg">Здесь появится ваше изображение</p>
            </div>
            <img id="generatedImage" class="hidden max-w-full max-h-full object-contain shadow-2xl transition-opacity duration-500" src="" alt="Generated Art">
        </div>
    </div>
</main>

<script>
    const generateBtn = document.getElementById('generateBtn');
    const promptInput = document.getElementById('promptInput');
    const ratioSelect = document.getElementById('ratioSelect');
    const styleSelect = document.getElementById('styleSelect');
    const resultContainer = document.getElementById('resultContainer');
    const placeholder = document.getElementById('placeholder');
    const generatedImage = document.getElementById('generatedImage');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');

    generateBtn.addEventListener('click', async () => {
        const prompt = promptInput.value.trim();
        if (!prompt) return alert('Введите промпт!');

        // Состояние загрузки
        generateBtn.disabled = true;
        loader.classList.remove('hidden');
        btnText.textContent = 'Генерация...';
        placeholder.classList.add('hidden');
        generatedImage.classList.add('opacity-50');

        try {
            const response = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: prompt,
                    ratio: ratioSelect.value,
                    style: styleSelect.value
                })
            });

            const data = await response.json();

            if (data.success) {
                generatedImage.src = data.url;
                generatedImage.classList.remove('hidden', 'opacity-50');
            } else {
                alert('Ошибка: ' + data.error);
                placeholder.classList.remove('hidden');
            }
        } catch (err) {
            alert('Сетевая ошибка');
            placeholder.classList.remove('hidden');
        } finally {
            generateBtn.disabled = false;
            loader.classList.add('hidden');
            btnText.textContent = 'Генерировать';
        }
    });
</script>
