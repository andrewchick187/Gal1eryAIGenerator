<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassaku XL Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] text-gray-100 min-h-screen">

    <main class="max-w-6xl mx-auto p-6 flex flex-col lg:flex-row gap-8">
        <div class="w-full lg:w-1/3 space-y-6">
            <h1 class="text-3xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">Hassaku XL</h1>
            
            <div class="bg-[#161b2c] p-6 rounded-2xl border border-gray-800 shadow-xl">
                <label class="block text-sm text-gray-400 mb-2">Введите промпт:</label>
                <textarea id="promptInput" class="w-full h-32 p-3 bg-[#0f172a] border border-gray-700 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none transition-all" placeholder="girl in forest, cinematic lighting..."></textarea>
                
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Формат</label>
                        <select id="ratioSelect" class="w-full p-2 bg-[#0f172a] border border-gray-700 rounded-lg text-sm">
                            <option value="9:16">Портрет (9:16)</option>
                            <option value="1:1">Квадрат (1:1)</option>
                            <option value="16:9">Альбом (16:9)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Стиль</label>
                        <select id="styleSelect" class="w-full p-2 bg-[#0f172a] border border-gray-700 rounded-lg text-sm">
                            <option value="anime style">Аниме</option>
                            <option value="photorealistic">Реализм</option>
                            <option value="digital illustration">Иллюстрация</option>
                        </select>
                    </div>
                </div>

                <button id="generateBtn" class="w-full mt-6 py-4 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-xl font-bold hover:brightness-110 transition-all flex items-center justify-center gap-3">
                    <span id="btnText">Сгенерировать</span>
                    <div id="loader" class="hidden w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                </button>
            </div>
        </div>

        <div class="w-full lg:w-2/3">
            <div id="resultBox" class="bg-[#0f172a] border-2 border-dashed border-gray-800 rounded-3xl h-[700px] flex items-center justify-center relative overflow-hidden shadow-2xl">
                <div id="placeholder" class="text-center text-gray-600">
                    <p class="text-5xl mb-4">🎨</p>
                    <p>Здесь появится результат генерации</p>
                </div>
                <img id="resImg" class="hidden max-w-full max-h-full object-contain" src="" alt="AI Result">
            </div>
        </div>
    </main>

    <script>
        const btn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const resImg = document.getElementById('resImg');
        const placeholder = document.getElementById('placeholder');

        btn.addEventListener('click', async () => {
            const prompt = document.getElementById('promptInput').value;
            if(!prompt) return alert('Введите текст!');

            // Блокировка UI
            btn.disabled = true;
            loader.classList.remove('hidden');
            btnText.textContent = 'Генерация...';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        prompt: prompt,
                        ratio: document.getElementById('ratioSelect').value,
                        style: document.getElementById('styleSelect').value
                    })
                });

                const data = await response.json();

                if(data.success) {
                    resImg.src = data.url;
                    resImg.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (e) {
                alert('Ошибка связи с сервером');
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                btnText.textContent = 'Сгенерировать';
            }
        });
    </script>
</body>
</html>
