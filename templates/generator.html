<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Generator | Создание</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' }
                    }
                }
            }
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
        
        /* Стеклянный эффект */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }
        .dark .glass-panel {
            background: rgba(17, 24, 39, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .image-fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        /* Анимированный градиент фона */
        .bg-gradient-animate {
            background: linear-gradient(-45deg, #f3e8ff, #e0e7ff, #fce7f3, #fae8ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        .dark .bg-gradient-animate {
            background: linear-gradient(-45deg, #1e1b4b, #0f172a, #2e1065, #171717);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
    </style>
</head>
<body class="bg-gradient-animate text-gray-900 dark:text-gray-100 transition-colors duration-500 min-h-screen flex flex-col relative overflow-x-hidden">

    <div id="serverStatusOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-white/20 dark:bg-black/40 backdrop-blur-xl transition-all duration-500">
        <div class="glass-panel p-8 rounded-3xl max-w-md w-full mx-4 text-center transform transition-all">
            <div id="statusIcon" class="mb-6 flex justify-center">
                <div class="w-16 h-16 border-4 border-purple-500/30 border-t-purple-600 rounded-full animate-spin"></div>
            </div>
            <h2 class="text-xl font-semibold mb-2" id="statusTitle">Подготовка сервера</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-6" id="statusMessage">Подключение...</p>
            
            <div id="progressContainer" class="hidden w-full bg-gray-200 dark:bg-gray-800 rounded-full h-3 mb-2 overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-purple-500 to-indigo-500 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <p id="progressText" class="hidden text-xs font-bold text-purple-600 dark:text-purple-400 text-right">0%</p>
        </div>
    </div>

    <header class="glass-panel sticky top-0 z-40 border-b-0 border-t-0 border-l-0 border-r-0 border-b-white/20 dark:border-b-white/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="p-2.5 bg-white/50 dark:bg-black/30 hover:bg-white dark:hover:bg-black/50 rounded-full transition-all text-gray-600 dark:text-gray-300 hover:scale-105 backdrop-blur-md">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </a>
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-600 to-indigo-500 tracking-tight">
                    Vision AI
                </h1>
            </div>
            <a href="/" class="text-sm font-semibold px-4 py-2 rounded-full glass-panel hover:bg-white/60 dark:hover:bg-white/10 transition-all">Галерея</a>
        </div>
    </header>

    <main class="flex-grow flex flex-col lg:flex-row max-w-7xl mx-auto w-full p-6 lg:p-8 gap-10">
        
        <div class="w-full lg:w-96 shrink-0 relative z-10">
            <div class="glass-panel p-8 rounded-[2rem] sticky top-28">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold mb-3 text-gray-700 dark:text-gray-300">Что нарисуем?</label>
                        <textarea id="promptInput" 
                            class="w-full h-36 p-5 bg-white/50 dark:bg-black/30 border border-white/40 dark:border-gray-700/50 rounded-2xl focus:ring-2 focus:ring-purple-500/50 focus:outline-none transition-all resize-none text-sm backdrop-blur-sm placeholder-gray-400 dark:placeholder-gray-600"
                            placeholder="A beautiful futuristic city, neon lights, masterpiece, 8k resolution..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Формат</label>
                            <select id="ratioSelect" class="w-full p-4 bg-white/50 dark:bg-black/30 border border-white/40 dark:border-gray-700/50 rounded-xl text-sm focus:ring-2 focus:ring-purple-500/50 outline-none backdrop-blur-sm appearance-none cursor-pointer">
                                <option value="9:16">📱 9:16 (Story)</option>
                                <option value="16:9">🖥️ 16:9 (PC)</option>
                                <option value="1:1">⬛ 1:1 (Square)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Стиль</label>
                            <select id="styleSelect" class="w-full p-4 bg-white/50 dark:bg-black/30 border border-white/40 dark:border-gray-700/50 rounded-xl text-sm focus:ring-2 focus:ring-purple-500/50 outline-none backdrop-blur-sm appearance-none cursor-pointer">
                                <option value="Anime">Anime</option>
                                <option value="Realistic">Realistic</option>
                                <option value="Cinematic">Cinematic</option>
                                <option value="Fantasy">Fantasy</option>
                            </select>
                        </div>
                    </div>

                    <button id="generateBtn" disabled
                        class="w-full py-4 mt-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold rounded-2xl shadow-xl shadow-purple-500/30 transition-all transform hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-3 group disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                        <span id="btnText">Ожидание сервера...</span>
                        <div id="loader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-grow flex flex-col z-10">
            <div id="resultContainer" class="glass-panel flex-grow rounded-[2.5rem] flex items-center justify-center relative overflow-hidden group min-h-[500px]">
                
                <div id="placeholder" class="text-center px-6 transition-all duration-500">
                    <div class="w-24 h-24 bg-white/40 dark:bg-black/20 backdrop-blur-md rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-inner border border-white/50 dark:border-white/5">
                        <svg class="w-10 h-10 text-purple-500/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <p class="text-gray-500 dark:text-gray-400 font-medium">Холст пуст</p>
                </div>

                <img id="generatedImage" 
                    class="hidden absolute inset-0 w-full h-full object-contain image-fade-in p-4" 
                    src="" alt="Generated Art">
                
                <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/40 dark:bg-gray-900/60 backdrop-blur-xl flex items-center justify-center z-10 transition-all">
                    <div class="text-center bg-white/60 dark:bg-black/50 p-8 rounded-3xl shadow-2xl border border-white/20">
                        <div class="inline-block w-14 h-14 border-4 border-purple-500/20 border-t-purple-600 rounded-full animate-spin mb-4"></div>
                        <p class="text-sm font-semibold bg-clip-text text-transparent bg-gradient-to-r from-purple-600 to-indigo-500 animate-pulse">Магия в процессе...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const promptInput = document.getElementById('promptInput');
        const placeholder = document.getElementById('placeholder');
        const generatedImage = document.getElementById('generatedImage');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');

        // Элементы статуса
        const statusOverlay = document.getElementById('serverStatusOverlay');
        const statusTitle = document.getElementById('statusTitle');
        const statusMessage = document.getElementById('statusMessage');
        const statusIcon = document.getElementById('statusIcon');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        let isServerReady = false;

        // Полная проверка статуса сервера
        async function checkServerStatus() {
            if(isServerReady) return; // Останавливаем опрос, если уже готово

            try {
                const res = await fetch('/status');
                const data = await res.json();
                
                statusMessage.textContent = data.message;

                if (data.status === 'downloading') {
                    statusTitle.textContent = "Скачивание файлов";
                    progressContainer.classList.remove('hidden');
                    progressText.classList.remove('hidden');
                    progressBar.style.width = data.progress + '%';
                    progressText.textContent = data.progress + '%';
                } 
                else if (data.status === 'loading') {
                    statusTitle.textContent = "Запуск нейросети";
                    progressContainer.classList.add('hidden');
                    progressText.classList.add('hidden');
                } 
                else if (data.status === 'ready') {
                    isServerReady = true;
                    statusOverlay.style.opacity = '0';
                    setTimeout(() => statusOverlay.classList.add('hidden'), 500);
                    
                    generateBtn.disabled = false;
                    btnText.textContent = 'Создать шедевр';
                }
                else if (data.status === 'error') {
                    statusTitle.textContent = "Системная ошибка";
                    statusTitle.classList.add('text-red-500');
                    statusIcon.innerHTML = `<svg class="w-16 h-16 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
                    progressContainer.classList.add('hidden');
                    progressText.classList.add('hidden');
                }

                if (!isServerReady && data.status !== 'error') {
                    setTimeout(checkServerStatus, 2000); // Опрашиваем каждые 2 секунды
                }
            } catch (err) {
                console.error("Ошибка проверки статуса:", err);
                setTimeout(checkServerStatus, 3000);
            }
        }

        // Запускаем проверку при загрузке страницы
        checkServerStatus();

        // Логика кнопки генерации
        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) {
                promptInput.classList.add('ring-2', 'ring-red-500');
                setTimeout(() => promptInput.classList.remove('ring-2', 'ring-red-500'), 1500);
                return;
            }

            generateBtn.disabled = true;
            loadingOverlay.classList.remove('hidden');
            loader.classList.remove('hidden');
            btnText.textContent = 'Генерация...';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        ratio: document.getElementById('ratioSelect').value,
                        style: document.getElementById('styleSelect').value
                    })
                });

                const data = await response.json();

                if (data.success) {
                    generatedImage.src = data.url;
                    generatedImage.onload = () => {
                        generatedImage.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                    };
                } else {
                    alert('Ошибка генерации: ' + data.error);
                }
            } catch (err) {
                alert('Не удалось связаться с сервером.');
            } finally {
                generateBtn.disabled = false;
                loadingOverlay.classList.add('hidden');
                loader.classList.add('hidden');
                btnText.textContent = 'Создать шедевр';
            }
        });
    </script>
</body>
</html>
