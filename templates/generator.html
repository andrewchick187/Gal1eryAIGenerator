<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Generator | Создание</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' }
                    }
                }
            }
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #374151; }
        .image-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col">

    <header class="border-b border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-900/70 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors text-gray-500 hover:text-purple-600" title="Вернуться в галерею">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </a>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-600 to-indigo-500">
                    AI Генератор
                </h1>
            </div>
            <a href="/" class="text-sm font-medium text-purple-600 hover:text-purple-500">Галерея</a>
        </div>
    </header>

    <main class="flex-grow flex flex-col lg:flex-row max-w-7xl mx-auto w-full p-4 lg:p-8 gap-8">
        <div class="w-full lg:w-80 xl:w-96 shrink-0">
            <div class="bg-white dark:bg-gray-900 p-6 rounded-3xl shadow-xl shadow-gray-200/50 dark:shadow-none border border-gray-100 dark:border-gray-800 sticky top-24">
                <h2 class="text-sm font-bold uppercase tracking-wider text-gray-400 mb-6">Параметры генерации</h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium mb-2 opacity-70">Текстовый запрос</label>
                        <textarea id="promptInput" 
                            class="w-full h-32 p-4 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl focus:ring-2 focus:ring-purple-500 focus:outline-none transition-all resize-none text-sm"
                            placeholder="Опишите, что вы хотите увидеть (на английском)..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase opacity-50 mb-2">Соотношение</label>
                            <select id="ratioSelect" class="w-full p-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-purple-500 outline-none">
                                <option value="9:16">9:16 Портрет</option>
                                <option value="16:9">16:9 Пейзаж</option>
                                <option value="1:1">1:1 Квадрат</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase opacity-50 mb-2">Стиль</label>
                            <select id="styleSelect" class="w-full p-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-purple-500 outline-none">
                                <option value="Anime">Аниме</option>
                                <option value="Realism">Реализм</option>
                                <option value="3D Render">3D Рендер</option>
                                <option value="Oil painting">Масло</option>
                            </select>
                        </div>
                    </div>

                    <button id="generateBtn" 
                        class="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-purple-500/25 transition-all transform active:scale-[0.98] flex items-center justify-center gap-3 group">
                        <span id="btnText">Создать шедевр</span>
                        <div id="loader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                        <svg id="sparkleIcon" class="w-5 h-5 group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-grow">
            <div id="resultContainer" class="bg-white dark:bg-gray-900 border-2 border-dashed border-gray-200 dark:border-gray-800 rounded-[2rem] h-[500px] lg:h-[700px] flex items-center justify-center relative overflow-hidden group shadow-inner">
                
                <div id="placeholder" class="text-center px-6">
                    <div class="w-20 h-20 bg-gray-50 dark:bg-gray-800 rounded-3xl flex items-center justify-center mx-auto mb-6 transition-colors">
                        <svg class="w-10 h-10 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <p class="text-gray-400 font-medium">Готов к вашей первой идее</p>
                    <p class="text-xs text-gray-500 mt-2 italic">Модель работает локально</p>
                </div>

                <img id="generatedImage" 
                    class="hidden max-w-full max-h-full object-contain shadow-2xl image-fade-in" 
                    src="" alt="Generated Art">
                
                <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/60 dark:bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-10">
                    <div class="text-center">
                        <div class="inline-block w-12 h-12 border-4 border-purple-500/20 border-t-purple-600 rounded-full animate-spin mb-4"></div>
                        <p class="text-sm font-semibold text-purple-600 animate-pulse">Нейросеть рисует... (это может занять время)</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const promptInput = document.getElementById('promptInput');
        const ratioSelect = document.getElementById('ratioSelect');
        const styleSelect = document.getElementById('styleSelect');
        const placeholder = document.getElementById('placeholder');
        const generatedImage = document.getElementById('generatedImage');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loader = document.getElementById('loader');
        const sparkleIcon = document.getElementById('sparkleIcon');
        const btnText = document.getElementById('btnText');

        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) {
                promptInput.classList.add('ring-2', 'ring-red-500');
                setTimeout(() => promptInput.classList.remove('ring-2', 'ring-red-500'), 2000);
                return;
            }

            generateBtn.disabled = true;
            loadingOverlay.classList.remove('hidden');
            loader.classList.remove('hidden');
            sparkleIcon.classList.add('hidden');
            btnText.textContent = 'Обработка...';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        ratio: ratioSelect.value,
                        style: styleSelect.value
                    })
                });

                const data = await response.json();

                if (data.success) {
                    generatedImage.src = data.url;
                    generatedImage.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                } else {
                    alert('Ошибка нейросети: ' + data.error);
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            } finally {
                generateBtn.disabled = false;
                loadingOverlay.classList.add('hidden');
                loader.classList.add('hidden');
                sparkleIcon.classList.remove('hidden');
                btnText.textContent = 'Создать шедевр';
            }
        });
    </script>
</body>
</html>
